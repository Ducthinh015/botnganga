<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 KIM NGÂN - Lovely AI 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 50%, #d1fae5 100%); overflow: hidden; height: 100vh; }
        .glass-pink { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 2px solid rgba(255, 182, 193, 0.4); }
        .chat-container { height: calc(100vh - 320px); scrollbar-width: none; }
        .message-user { background: linear-gradient(135deg, #f472b6, #db2777); border-radius: 20px 20px 0 20px; color: white; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.2); }
        .message-ai { background: white; border-radius: 20px 20px 20px 0; border: 1px solid #fbcfe8; color: #374151; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .flower-title { font-family: 'Dancing Script', cursive; }
        .petal { position: fixed; top: -10%; user-select: none; pointer-events: none; z-index: 0; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        .prose p { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="flex items-center justify-center p-2 sm:p-4">

    <div id="petal-container"></div>

    <div class="w-full max-w-2xl glass-pink rounded-[40px] shadow-[0_20px_50px_rgba(244,114,182,0.3)] overflow-hidden flex flex-col relative z-10">
        
        <header class="p-4 sm:p-6 text-center border-b border-pink-100 bg-white/40">
            <h1 class="text-2xl sm:text-3xl flower-title text-pink-600 drop-shadow-sm">🌸 Chào Công Chúa Kim Ngân 🌸</h1>
            <div class="mt-4 flex flex-col items-center gap-2">
                <input type="password" id="apiKey" placeholder="Dán API Key bí mật vào đây..." 
                       class="text-sm px-4 py-2 rounded-full border-2 border-pink-200 focus:border-pink-400 outline-none w-full max-w-xs text-center shadow-inner">
            </div>
        </header>

        <div id="chatBox" class="chat-container overflow-y-auto p-4 sm:p-6 flex flex-col gap-4">
            <div class="flex gap-3 items-end">
                <div class="w-8 h-8 rounded-full bg-pink-200 flex items-center justify-center shadow-sm text-xs">🎀</div>
                <div class="message-ai p-3 sm:p-4 text-sm prose max-w-[85%]">
                    Chào Kim Ngân xinh đẹp! Mình đã sửa lỗi xong rồi nè. Nàng dán API Key vào rồi thử trò chuyện nhé! ✨
                </div>
            </div>
        </div>

        <div class="p-4 sm:p-6 bg-white/30">
            <div class="relative flex items-center">
                <input type="text" id="userInput" placeholder="Nhập tâm tình vào đây..." 
                       class="w-full p-3 sm:p-4 pr-16 rounded-full border-2 border-pink-200 focus:border-pink-500 outline-none shadow-lg bg-white/80 text-sm">
                <button onclick="sendMessage()" 
                        class="absolute right-2 w-10 h-10 sm:w-12 sm:h-12 bg-gradient-to-r from-pink-400 to-rose-500 text-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </button>
            </div>
            <p class="text-center text-[9px] text-pink-400 mt-3 font-semibold tracking-widest uppercase">✨ Fairy Garden for Kim Ngan ✨</p>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const apiKeyInput = document.getElementById('apiKey');

        if(localStorage.getItem('gemini_key')) {
            apiKeyInput.value = localStorage.getItem('gemini_key');
        }

        function createPetal() {
            const container = document.getElementById('petal-container');
            if(!container) return;
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerText = ['🌸', '✨', '🌷', '🌹', '💖'][Math.floor(Math.random() * 5)];
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.fontSize = Math.random() * 15 + 10 + 'px';
            petal.style.animationDuration = Math.random() * 3 + 4 + 's';
            container.appendChild(petal);
            setTimeout(() => petal.remove(), 6000);
        }
        setInterval(createPetal, 600);

        async function sendMessage() {
            const text = userInput.value.trim();
            const key = apiKeyInput.value.trim();
            if (!key) return alert("Nàng ơi, dán API Key vào ô ở trên đã nhé!");
            if (!text) return;

            localStorage.setItem('gemini_key', key);
            appendMessage(text, 'user');
            userInput.value = '';
            const loadingId = addLoading();

            try {
                // Sửa URL chuẩn xác để tránh lỗi 404
                const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                removeLoading(loadingId);

                if (data.error) {
                    appendMessage("❌ Lỗi: " + data.error.message, 'ai');
                } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                    appendMessage(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    appendMessage("🤖 AI không phản hồi, nàng kiểm tra lại Key nhé!", 'ai');
                }
            } catch (e) {
                removeLoading(loadingId);
                appendMessage("❌ Lỗi kết nối: " + e.message, 'ai');
            }
        }

        function appendMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-3 items-end ${sender === 'user' ? 'flex-row-reverse' : ''}`;
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex items-center justify-center bg-white shadow-sm text-xs border border-pink-100`;
            avatar.innerText = sender === 'user' ? '👑' : '🎀';
            const content = document.createElement('div');
            content.className = `p-3 sm:p-4 shadow-sm prose text-sm ${sender === 'user' ? 'message-user' : 'message-ai'}`;
            content.innerHTML = marked.parse(text);
            wrapper.appendChild(avatar);
            wrapper.appendChild(content);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addLoading() {
            const id = 'load-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "text-pink-400 text-[10px] italic ml-12 animate-pulse";
            div.innerText = "Đang tìm câu trả lời cho nàng...";
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeLoading(id) { document.getElementById(id)?.remove(); }
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
